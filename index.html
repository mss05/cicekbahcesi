<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hira</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <section class="question-screen" id="questionScreen">
    <div class="question-card">
      <div class="hira-pill">Hira</div>

      <img src="banner.gif" alt="Banner" class="banner" />

      <h1>Çiçeği kabul ediyor musun?</h1>

      <p class="question-text">
        Bu soru göründüğü kadar basit değil. Hayır demek serbest ama sistem bu fikri çok desteklemiyor gibi.
      </p>

      <div class="buttons">
        <button id="yesBtn">Evet</button>
        <button id="noBtn">Hayır</button>
      </div>
    </div>
  </section>

  <section class="final-screen hidden" id="finalScreen">
    <div class="night"></div>
    <div class="stars"></div>

    <div class="final-content">
      <div class="final-title">
        <h2>Madem kabul edildi,</h2>
        <p>özen belli olsun dedik.</p>
      </div>

      <div class="bouquet-scene">
        <div class="moon-glow"></div>
        <div class="fireflies">
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="bouquet" id="bouquet">
          <div class="flower-layer" id="flowerLayer"></div>

          <div class="wrap wrap-left"></div>
          <div class="wrap wrap-right"></div>
          <div class="wrap wrap-front"></div>

          <div class="ribbon">Hira</div>
        </div>
      </div>

      <img src="penguen.gif" alt="Penguen" class="penguin" />

      <div class="final-sign">Hira için yapıldı</div>
    </div>
  </section>

  <script>
    const questionScreen = document.getElementById("questionScreen");
    const finalScreen = document.getElementById("finalScreen");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const flowerLayer = document.getElementById("flowerLayer");

    let noCount = 0;
    let yesScale = 1;
    let bouquetBuilt = false;

    const noMessages = [
      "Emin misin?",
      "Bir daha düşün",
      "Bence evet daha iyi",
      "Hayır biraz zayıf kaldı",
      "Sistem eveti büyütüyor",
      "Son şans",
      "Artık evet zorunlu"
    ];

    noBtn.addEventListener("click", () => {
      noCount++;
      yesScale += 0.35;

      yesBtn.style.transform = "scale(" + yesScale + ")";
      noBtn.textContent = noMessages[Math.min(noCount - 1, noMessages.length - 1)];

      if (noCount >= 4) {
        noBtn.style.transform = "scale(0.82)";
        noBtn.style.opacity = "0.75";
      }

      if (noCount >= 6) {
        noBtn.style.display = "none";
        yesBtn.textContent = "Evet demek zorundasın";
        yesBtn.style.transform = "scale(2)";
      }
    });

    yesBtn.addEventListener("click", () => {
      questionScreen.classList.add("hidden");
      finalScreen.classList.remove("hidden");

      if (!bouquetBuilt) {
        createBouquet();
        bouquetBuilt = true;
      }
    });

    function createBouquet() {
      const flowers = [
        { x: 11, y: 72, r: -34, s: .72, h: 210, c1: "#ff6fa3", c2: "#ffc7dc", z: 4 },
        { x: 17, y: 28, r: -28, s: .88, h: 265, c1: "#ff7ead", c2: "#ffd2e3", z: 5 },
        { x: 22, y: 92, r: -24, s: .62, h: 180, c1: "#ff9abc", c2: "#ffe0eb", z: 8 },
        { x: 27, y: 12, r: -20, s: .98, h: 305, c1: "#f85d96", c2: "#ffc2d8", z: 6 },
        { x: 32, y: 74, r: -16, s: .74, h: 220, c1: "#ff8fb5", c2: "#ffdae6", z: 9 },
        { x: 36, y: 36, r: -12, s: .86, h: 270, c1: "#ff6b9f", c2: "#ffd0e0", z: 7 },
        { x: 40, y: 105, r: -8, s: .58, h: 165, c1: "#ffabc7", c2: "#ffe6ef", z: 10 },
        { x: 44, y: -16, r: -5, s: 1.08, h: 340, c1: "#ff5f98", c2: "#ffc6da", z: 8 },
        { x: 48, y: 82, r: -2, s: .68, h: 205, c1: "#ff86b0", c2: "#ffdae7", z: 11 },
        { x: 52, y: 22, r: 3, s: .95, h: 295, c1: "#f7659c", c2: "#ffd0df", z: 9 },
        { x: 56, y: 102, r: 7, s: .58, h: 168, c1: "#ff9fbe", c2: "#ffe3ed", z: 10 },
        { x: 60, y: 46, r: 11, s: .82, h: 252, c1: "#ff76a7", c2: "#ffd4e2", z: 7 },
        { x: 65, y: 86, r: 16, s: .68, h: 205, c1: "#ff94b8", c2: "#ffe0ea", z: 9 },
        { x: 70, y: 18, r: 21, s: .93, h: 288, c1: "#ff6fa3", c2: "#ffcfe0", z: 6 },
        { x: 76, y: 74, r: 28, s: .70, h: 215, c1: "#ffa7c4", c2: "#ffe6ee", z: 8 },
        { x: 82, y: 38, r: 33, s: .78, h: 248, c1: "#ff7ead", c2: "#ffd7e5", z: 5 },

        { x: 24, y: 128, r: -22, s: .48, h: 130, c1: "#ffb0ca", c2: "#ffe9f0", z: 13 },
        { x: 31, y: 138, r: -15, s: .46, h: 118, c1: "#ff8eb4", c2: "#ffdeea", z: 14 },
        { x: 39, y: 146, r: -8, s: .44, h: 108, c1: "#ff73a5", c2: "#ffd5e3", z: 15 },
        { x: 58, y: 146, r: 8, s: .44, h: 108, c1: "#ff80ad", c2: "#ffdbe7", z: 15 },
        { x: 66, y: 138, r: 16, s: .46, h: 118, c1: "#ff9fbe", c2: "#ffe3ed", z: 14 },
        { x: 73, y: 128, r: 24, s: .48, h: 130, c1: "#ff88b1", c2: "#ffdeea", z: 13 }
      ];

      flowerLayer.innerHTML = "";

      flowers.forEach((f, index) => {
        const flower = document.createElement("div");
        flower.className = "flower";

        flower.style.setProperty("--x", f.x + "%");
        flower.style.setProperty("--y", f.y + "px");
        flower.style.setProperty("--r", f.r + "deg");
        flower.style.setProperty("--s", f.s);
        flower.style.setProperty("--h", f.h + "px");
        flower.style.setProperty("--c1", f.c1);
        flower.style.setProperty("--c2", f.c2);
        flower.style.setProperty("--delay", index * 0.085 + "s");
        flower.style.setProperty("--z", f.z);

        flower.innerHTML = `
          <div class="stem">
            <span class="stem-light"></span>
          </div>

          <div class="leaf leaf-one"></div>
          <div class="leaf leaf-two"></div>
          <div class="leaf leaf-three"></div>

          <div class="bloom">
            <div class="petal petal-one"></div>
            <div class="petal petal-two"></div>
            <div class="petal petal-three"></div>
            <div class="petal petal-four"></div>
            <div class="petal petal-five"></div>
            <div class="petal petal-six"></div>
            <div class="center"></div>
            <div class="flower-light light-one"></div>
            <div class="flower-light light-two"></div>
            <div class="flower-light light-three"></div>
          </div>
        `;

        flowerLayer.appendChild(flower);

        requestAnimationFrame(() => {
          flower.classList.add("grow");
        });
      });
    }
  </script>
</body>
</html>
