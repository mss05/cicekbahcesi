<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beni Affet 🥺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #ff4da6;
    --pink-light: #ff8dcb;
    --pink-deep: #d6006e;
    --techno-purple: #9c27b0;
    --techno-blue: #00bcd4;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #ffe9f5 0%, #ffd6ee 40%, #ffecf9 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    transition: background 1.5s ease;
  }

  /* Arka plan baloncukları */
  .bg-bubble {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0.18;
    animation: drift linear infinite;
  }
  @keyframes drift {
    0% { transform: translateY(110vh) scale(0.8); opacity: 0; }
    10% { opacity: 0.18; }
    90% { opacity: 0.18; }
    100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
  }

  /* ---- ANA EKRAN ---- */
  #main-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.4rem;
    padding: 2rem 1.5rem;
    max-width: 560px;
    width: 100%;
    text-align: center;
  }

  /* Banner en üstte */
  .banner-wrap {
    width: 100%;
    max-width: 320px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 6px 30px rgba(255, 77, 166, 0.3);
    border: 3px solid rgba(255, 141, 203, 0.5);
    margin-bottom: 10px;
  }
  .banner-wrap img {
    width: 100%;
    display: block;
  }

  .msg-box {
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #message {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.15rem, 4.5vw, 1.75rem);
    color: var(--pink-deep);
    text-shadow: 0 2px 14px rgba(214, 0, 110, 0.25);
    line-height: 1.5;
    transition: opacity 0.3s ease, transform 0.3s ease;
    max-width: 480px;
  }
  #message.hidden { opacity: 0; transform: scale(0.95); }

  .btn-area {
    display: flex;
    gap: 1rem;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    position: relative;
    min-height: 80px;
    width: 100%;
  }

  #yes-btn {
    background: linear-gradient(135deg, #ff6eba, #ff3fa0);
    color: #fff;
    border: none;
    border-radius: 60px;
    padding: 14px 36px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.25rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 5px 22px rgba(255, 63, 160, 0.45);
    transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
    position: relative;
    z-index: 10;
  }
  #yes-btn:hover { transform: scale(1.06); }
  #yes-btn:active { transform: scale(0.97); }

  #no-btn {
    background: #fff;
    color: #bbb;
    border: 2px solid #e8d5e2;
    border-radius: 60px;
    padding: 11px 26px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    z-index: 20;
  }
  #no-btn:hover { background: #fff0f7; color: #999; }

  /* ---- EVET EKRANI ---- */
  #yes-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding: 2rem;
    animation: fadeInScale 0.8s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  #flower-canvas {
    display: block;
    filter: drop-shadow(0 0 18px rgba(255, 80, 180, 0.7));
  }

  .yes-text {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    color: #ff8dcb;
    text-shadow: 0 0 20px rgba(255, 141, 203, 0.7);
    animation: glow 2s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { text-shadow: 0 0 10px rgba(255,141,203,0.5); }
    to   { text-shadow: 0 0 28px rgba(255,141,203,1), 0 0 50px rgba(255,80,180,0.4); }
  }

  .penguin-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 3rem;
  }
  
  /* Penguen.gif için stil */
  .penguin-gif {
    max-width: 120px;
    height: auto;
    animation: heartbeat 0.75s ease-in-out infinite alternate;
  }
  
  .heart-icon {
    font-size: 2.2rem;
    display: inline-block;
    animation: heartbeat 0.75s ease-in-out infinite alternate;
  }
  @keyframes heartbeat {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  /* Uçuşan kalpler */
  .floater {
    position: fixed;
    pointer-events: none;
    animation: floatUp 2.5s ease-out forwards;
    font-size: 1.6rem;
    z-index: 999;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(-220px) rotate(20deg) scale(0.4); }
  }

  /* Parlayan partiküller */
  .sparkle {
    position: fixed;
    pointer-events: none;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ff8dcb;
    animation: sparkleAnim 1s ease-out forwards;
  }
  @keyframes sparkleAnim {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }
</style>
</head>
<body>

<script>
  // Arka plan baloncuklarını oluşturur
  (function() {
    const colors = ['#ffb3d9','#ff8dcb','#ffc2e0','#ff69b4','#ffd6ee'];
    for (let i = 0; i < 12; i++) {
      const b = document.createElement('div');
      b.className = 'bg-bubble';
      const size = 30 + Math.random() * 80;
      b.style.cssText = `
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        left:${Math.random()*100}vw;
        bottom:-${size}px;
        animation-duration:${8+Math.random()*14}s;
        animation-delay:${Math.random()*12}s;
      `;
      document.body.appendChild(b);
    }
  })();
</script>

<div id="main-screen">

  <div class="banner-wrap">
    <img src="banner.gif" alt="Seni Seviyorum Banner" />
  </div>

  <div class="msg-box">
    <div id="message">Seni Çok Seviyorum, Beni Affeder Misin? 🥺</div>
  </div>

  <div class="btn-area" id="btn-area">
    <button id="yes-btn" onclick="sayYes()">Evet 💕</button>
    <button id="no-btn" onclick="sayNo()">Hayır</button>
  </div>

</div>

<div id="yes-screen">
  <canvas id="flower-canvas" width="500" height="500"></canvas>
  <div class="yes-text">Seni çok seviyorum! 💖</div>
  <div class="penguin-row">
    <img src="penguen.gif" alt="Kalp Atan Penguen" class="penguin-gif" />
  </div>
</div>

<script>
  // ── Mesajlar (Tam 9 Adet) ────────────────────────────────────────────────
  const messages = [
    "Seni Çok Seviyorum, Beni Affeder Misin? 🥺", // 1 (Başlangıç)
    "Çabalayacağız... Lütfen beni affet 💝", // 2
    "Bir şans daha ver, pişman olmayacaksın 🙏", // 3
    "Seni kaybetmek istemiyorum 💕", // 4
    "Sensiz bir hiçim, affetmeden gidemezsin! 🥺", // 5
    "Söz veriyorum, her şey daha güzel olacak 💌", // 6
    "Hayatımın en güzel detayı sensin...", // 7
    "Sana layık biri olmak için çabalıyorum 🐧❤️", // 8
    "Bir bak şu halime! Nolur beni affet! 😭" // 9
  ];

  let noCount = 0;
  let yesFontSize = 1.25; // rem
  let yesPaddingV = 14;
  let yesPaddingH = 36;
  const msgEl = document.getElementById('message');
  const yesBtn = document.getElementById('yes-btn');
  const noBtn  = document.getElementById('no-btn');

  // ── Hayır Butonu Tıklanma Olayı ──────────────────────────────────────────
  function sayNo() {
    noCount++;

    // 1. Yazıyı değiştir (Sadece butona basıldığında)
    msgEl.classList.add('hidden');
    setTimeout(() => {
      // noCount'a göre diziden mesaj seç, 9'dan sonraysa son mesajda kal
      const msgIndex = Math.min(noCount, messages.length - 1);
      msgEl.textContent = messages[msgIndex];
      msgEl.classList.remove('hidden');
    }, 150);

    // 2. Evet butonunu büyüt
    yesFontSize += 0.4;
    yesPaddingV += 8;
    yesPaddingH += 16;
    yesBtn.style.fontSize = yesFontSize + 'rem';
    yesBtn.style.padding  = `${yesPaddingV}px ${yesPaddingH}px`;

    // 3. 13. Tıklamada butonu tamamen gizle
    if (noCount >= 13) {
        noBtn.style.display = 'none'; 
    }
  }

  // ── Evet Butonu Tıklanma Olayı ───────────────────────────────────────────
  function sayYes() {
    // Kalp patlaması efekti
    const emojis = ['💕','💗','💖','💝','🌸','✨','💞'];
    for (let i = 0; i < 35; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'floater';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = (5 + Math.random() * 90) + 'vw';
        el.style.top  = (60 + Math.random() * 30) + 'vh';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2500);
      }, i * 60);
    }

    // Ekranı değiştir
    setTimeout(() => {
      document.getElementById('main-screen').style.display = 'none';
      const ys = document.getElementById('yes-screen');
      ys.style.display = 'flex';
      // Techno karanlık arkaplan
      document.body.style.background = 'linear-gradient(160deg, #12011a 0%, #2a0530 55%, #110018 100%)';
      setTimeout(bloomChrysanthemum, 500);
    }, 800);
  }

  // ── Techno Dijital Kasımpatı (Fractal Çizim) ─────────────────────────────
  function bloomChrysanthemum() {
    const canvas = document.getElementById('flower-canvas');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;

    ctx.clearRect(0, 0, W, H);

    const totalPetals = 50; // Çok daha sık petal
    let drawn = 0;

    function branch(x, y, angle, len, depth, hue, alpha) {
      if (depth <= 0 || len < 1.5) return; // Dallanma sınırları (daha dallı budaklı)
      const ex = x + Math.cos(angle) * len;
      const ey = y + Math.sin(angle) * len;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.shadowBlur  = 20; // Güçlü neon parlama
      ctx.shadowColor = `hsl(${hue}, 100%, 75%)`; 
      ctx.strokeStyle = `hsl(${hue}, 98%, ${55 + depth * 3}%)`;
      ctx.lineWidth   = Math.max(0.5, depth * 0.4); 
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(ex, ey);
      ctx.stroke();
      ctx.restore();

      const spread = 0.25 + (8 - depth) * 0.04;
      // 3 yönlü dallanma
      branch(ex, ey, angle - spread, len * 0.72, depth - 1, hue + 12, alpha * 0.9);
      branch(ex, ey, angle + spread, len * 0.72, depth - 1, hue - 12, alpha * 0.9);
      branch(ex, ey, angle,          len * 0.82, depth - 1, hue,      alpha * 0.98); 
    }

    function drawPetal() {
      if (drawn >= totalPetals) {
        // Çiçek tamamlandığında ortasına parlayan bir çekirdek ekle
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
        g.addColorStop(0,   'rgba(255,255,255,1)');
        g.addColorStop(0.3, 'rgba(255,105,180,0.9)');
        g.addColorStop(1,   'rgba(255,20,147,0)');
        
        ctx.save();
        ctx.shadowBlur  = 50;
        ctx.shadowColor = '#ff69b4';
        ctx.fillStyle   = g;
        ctx.beginPath();
        ctx.arc(cx, cy, 30, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Son dokunuş: Etrafa partiküller saç
        for (let s = 0; s < 35; s++) {
          setTimeout(() => sparkle(), s * 100);
        }
        return;
      }

      const petalAngle = (drawn / totalPetals) * Math.PI * 2 - Math.PI / 2;
      // Techno pembe / mor renk paleti geçişi: 280 (mor) -> 350 (neon pembe)
      const hue = 280 + (drawn / totalPetals) * 70;

      branch(cx, cy, petalAngle, 110, 8, hue, 0.98); 

      drawn++;
      setTimeout(drawPetal, 35); // Çiçeğin açma hızı
    }

    drawPetal();
  }

  // Uçuşan küçük ışıltılar
  function sparkle() {
    const el = document.createElement('div');
    el.className = 'sparkle';
    const cx = window.innerWidth  / 2;
    const cy = window.innerHeight / 2;
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';
    const tx = (Math.random() - 0.5) * 350;
    const ty = (Math.random() - 0.5) * 350;
    el.style.setProperty('--tx', tx + 'px');
    el.style.setProperty('--ty', ty + 'px');
    const colors = ['#ff69b4','#ff8dcb','#ff1493','#fff','#ff00ff','#00bcd4']; // Extra techno mavisi
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1100);
  }
</script>
</body>
</html>
