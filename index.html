<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hira</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      background:
        radial-gradient(circle at 15% 10%, rgba(255, 225, 235, 0.55), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(255, 238, 205, 0.6), transparent 32%),
        linear-gradient(135deg, #f8f0ee, #efe3da);
      color: #3f2d38;
      overflow-x: hidden;
    }

    .hidden {
      display: none !important;
    }

    .question-screen {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .question-card {
      width: min(92vw, 760px);
      padding: 30px 26px 28px;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 28px 70px rgba(70, 45, 55, 0.14);
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .hira-pill {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-width: 92px;
      padding: 10px 22px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(0, 0, 0, 0.04);
      color: #8d7480;
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.05);
    }

    .banner {
      display: block;
      width: min(100%, 390px);
      margin: 0 auto 24px;
      border-radius: 24px;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.13);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.05;
      letter-spacing: -0.035em;
      color: #43313b;
    }

    .question-text {
      max-width: 610px;
      margin: 0 auto 30px;
      color: #8f7c86;
      font-size: clamp(16px, 2vw, 18px);
      line-height: 1.55;
    }

    .buttons {
      min-height: 96px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 15px 31px;
      font-size: 19px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.25s ease, opacity 0.25s ease, background 0.25s ease;
    }

    #yesBtn {
      color: white;
      background: linear-gradient(135deg, #f35f98, #ff9ab8);
      box-shadow: 0 16px 30px rgba(243, 95, 152, 0.28);
      transform: scale(1);
      z-index: 3;
    }

    #noBtn {
      color: #493b43;
      background: #efebee;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.05);
      z-index: 2;
    }

    .final-screen {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 22%, rgba(27, 121, 129, 0.25), transparent 33%),
        radial-gradient(circle at 45% 58%, rgba(255, 83, 153, 0.13), transparent 36%),
        linear-gradient(180deg, #071516 0%, #010606 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 10px 18px;
    }

    .final-copy {
      position: relative;
      z-index: 10;
      text-align: center;
      color: rgba(255, 244, 249, 0.96);
      text-shadow: 0 5px 22px rgba(0, 0, 0, 0.62);
      margin-bottom: 0;
    }

    .final-copy h2 {
      margin: 0 0 6px;
      font-size: clamp(28px, 4.4vw, 54px);
      line-height: 1.05;
      letter-spacing: -0.045em;
      font-weight: 900;
    }

    .final-copy p {
      margin: 0;
      color: rgba(255, 230, 239, 0.82);
      font-size: clamp(15px, 2vw, 18px);
    }

    .canvas-wrap {
      width: min(98vw, 1040px);
      height: clamp(510px, 70vh, 690px);
      position: relative;
      z-index: 5;
      margin-top: 0;
      filter: drop-shadow(0 26px 52px rgba(0, 0, 0, 0.45));
    }

    #flowerCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .penguin {
      position: relative;
      z-index: 12;
      width: min(205px, 54vw);
      max-height: 165px;
      object-fit: contain;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.36);
      margin-top: -46px;
    }

    .final-sign {
      position: relative;
      z-index: 12;
      margin-top: 12px;
      color: rgba(255, 224, 235, 0.82);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.2px;
      text-align: center;
    }

    @media (max-width: 760px) {
      .question-screen {
        padding: 12px;
      }

      .question-card {
        width: 96vw;
        border-radius: 28px;
        padding: 22px 16px 20px;
      }

      .banner {
        max-width: 330px;
      }

      h1 {
        font-size: 34px;
      }

      .question-text {
        font-size: 15px;
        margin-bottom: 22px;
      }

      button {
        font-size: 17px;
        padding: 13px 22px;
      }

      .final-screen {
        padding-top: 28px;
      }

      .final-copy h2 {
        font-size: 29px;
      }

      .canvas-wrap {
        height: 500px;
      }

      .penguin {
        width: min(180px, 58vw);
        margin-top: -56px;
      }
    }

    @media (max-width: 430px) {
      .final-copy h2 {
        font-size: 26px;
      }

      .canvas-wrap {
        height: 455px;
      }

      .penguin {
        margin-top: -62px;
      }
    }
  </style>
</head>

<body>
  <section class="question-screen" id="questionScreen">
    <div class="question-card">
      <div class="hira-pill">Hira</div>

      <img src="banner.gif" alt="Banner" class="banner" />

      <h1>Çiçeği kabul ediyor musun?</h1>

      <p class="question-text">
        Bu soru göründüğü kadar basit değil. Hayır demek serbest ama sistem bu fikri çok desteklemiyor gibi.
      </p>

      <div class="buttons">
        <button id="yesBtn">Evet</button>
        <button id="noBtn">Hayır</button>
      </div>
    </div>
  </section>

  <section class="final-screen hidden" id="finalScreen">
    <div class="final-copy">
      <h2>Madem kabul edildi,</h2>
      <p>özen belli olsun dedik.</p>
    </div>

    <div class="canvas-wrap">
      <canvas id="flowerCanvas"></canvas>
    </div>

    <img src="penguen.gif" alt="Penguen" class="penguin" />

    <div class="final-sign">Hira için yapıldı</div>
  </section>

  <script>
    const questionScreen = document.getElementById("questionScreen");
    const finalScreen = document.getElementById("finalScreen");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const canvas = document.getElementById("flowerCanvas");
    const ctx = canvas.getContext("2d");

    let noCount = 0;
    let yesScale = 1;
    let started = false;
    let startTime = 0;
    let dpr = 1;

    const noMessages = [
      "Emin misin?",
      "Bir daha düşün",
      "Bence evet daha iyi",
      "Hayır biraz zayıf kaldı",
      "Sistem eveti büyütüyor",
      "Son şans",
      "Artık evet zorunlu"
    ];

    noBtn.addEventListener("click", () => {
      noCount++;
      yesScale += 0.35;

      yesBtn.style.transform = "scale(" + yesScale + ")";
      noBtn.textContent = noMessages[Math.min(noCount - 1, noMessages.length - 1)];

      if (noCount >= 4) {
        noBtn.style.transform = "scale(0.82)";
        noBtn.style.opacity = "0.75";
      }

      if (noCount >= 6) {
        noBtn.style.display = "none";
        yesBtn.textContent = "Evet demek zorundasın";
        yesBtn.style.transform = "scale(2)";
      }
    });

    yesBtn.addEventListener("click", () => {
      questionScreen.classList.add("hidden");
      finalScreen.classList.remove("hidden");

      resizeCanvas();
      startTime = performance.now();
      started = true;
      requestAnimationFrame(animate);
    });

    window.addEventListener("resize", () => {
      if (!started) return;
      resizeCanvas();
    });

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function animate(now) {
      const t = now - startTime;
      drawScene(t);
      requestAnimationFrame(animate);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function easeOutCubic(x) {
      x = clamp(x, 0, 1);
      return 1 - Math.pow(1 - x, 3);
    }

    function easeOutBack(x) {
      x = clamp(x, 0, 1);
      const c1 = 1.70158;
      const c3 = c1 + 1;
      return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
    }

    function qPoint(p0, p1, p2, t) {
      const a = (1 - t) * (1 - t);
      const b = 2 * (1 - t) * t;
      const c = t * t;

      return {
        x: a * p0.x + b * p1.x + c * p2.x,
        y: a * p0.y + b * p1.y + c * p2.y
      };
    }

    function drawScene(t) {
      const w = canvas.width / dpr;
      const h = canvas.height / dpr;
      const s = Math.min(w / 1000, h / 680);

      ctx.clearRect(0, 0, w, h);

      drawNight(w, h, t);
      drawGlow(w, h, s);
      drawGrass(w, h, s, t);
      drawFlowers(w, h, s, t);
      drawHira(w, h, s, t);
    }

    function drawNight(w, h, t) {
      const bg = ctx.createLinearGradient(0, 0, 0, h);
      bg.addColorStop(0, "#071516");
      bg.addColorStop(0.55, "#041011");
      bg.addColorStop(1, "#010606");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      for (let i = 0; i < 170; i++) {
        const x = ((i * 83.37 + t * 0.006) % 1000) / 1000 * w;
        const y = ((i * 41.91 + t * 0.003) % 1000) / 1000 * h;
        const isYellow = i % 13 === 0;
        const r = isYellow ? 1.55 : 0.85;
        const a = isYellow ? 0.55 : 0.28;

        ctx.beginPath();
        ctx.fillStyle = isYellow
          ? "rgba(255, 242, 86," + a + ")"
          : "rgba(111, 239, 250," + a + ")";
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      for (let i = 0; i < 9; i++) {
        const phase = t * 0.0014 + i * 1.7;
        const x = w * (0.12 + ((i * 0.163) % 0.76)) + Math.sin(phase) * 18;
        const y = h * (0.16 + ((i * 0.119) % 0.6)) + Math.cos(phase * 1.2) * 12;
        const alpha = 0.22 + Math.sin(phase * 2.2) * 0.2;

        ctx.save();
        ctx.globalAlpha = Math.max(0.05, alpha);
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#fff36a";
        ctx.fillStyle = "#fff36a";
        ctx.beginPath();
        ctx.arc(x, y, 3.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawGlow(w, h, s) {
      const cx = w / 2;
      const cy = h * 0.48;

      const g = ctx.createRadialGradient(cx, cy, 20 * s, cx, cy, 360 * s);
      g.addColorStop(0, "rgba(255, 95, 160, 0.20)");
      g.addColorStop(0.38, "rgba(34, 222, 222, 0.12)");
      g.addColorStop(1, "rgba(0, 0, 0, 0)");

      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(cx, cy, 370 * s, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawGrass(w, h, s, t) {
      const base = h * 0.93;
      const progress = easeOutCubic(t / 1800);

      const blades = [
        [0.08, 230, -0.32], [0.12, 300, -0.18], [0.17, 210, 0.28],
        [0.82, 235, 0.28], [0.88, 305, 0.15], [0.94, 205, 0.38],
        [0.33, 170, -0.34], [0.39, 210, -0.18], [0.62, 205, 0.18],
        [0.69, 170, 0.34], [0.46, 155, -0.05], [0.54, 160, 0.05]
      ];

      blades.forEach((b, i) => {
        const x = b[0] * w;
        const len = b[1] * s;
        const angle = b[2];
        const p = easeOutCubic(clamp((t - i * 70) / 1300, 0, 1)) * progress;

        ctx.save();
        ctx.translate(x, base);
        ctx.rotate(angle);
        ctx.scale(1, p);

        const grad = ctx.createLinearGradient(0, -len, 0, 0);
        grad.addColorStop(0, "#2bc83e");
        grad.addColorStop(0.65, "#0d701e");
        grad.addColorStop(1, "#021c0a");

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(-18 * s, -len * 0.38, -12 * s, -len * 0.82, 0, -len);
        ctx.bezierCurveTo(14 * s, -len * 0.75, 20 * s, -len * 0.32, 0, 0);
        ctx.fill();

        ctx.restore();
      });
    }

    function drawFlowers(w, h, s, t) {
      const baseY = h * 0.88;
      const baseX = w / 2;

      const flowers = [
        { ex: .50, ey: .10, bx: .50, cx: .50, cy: .50, size: 1.18, delay: 0,    color1: "#ff5f98", color2: "#ffd1df" },
        { ex: .39, ey: .28, bx: .48, cx: .40, cy: .55, size: .98, delay: 120,  color1: "#ff77a8", color2: "#ffd9e6" },
        { ex: .61, ey: .25, bx: .52, cx: .62, cy: .55, size: 1.02, delay: 240,  color1: "#ff6fa3", color2: "#ffd5e3" },
        { ex: .32, ey: .40, bx: .47, cx: .34, cy: .62, size: .78, delay: 360,  color1: "#ff8bb3", color2: "#ffe0ea" },
        { ex: .68, ey: .39, bx: .53, cx: .67, cy: .62, size: .78, delay: 480,  color1: "#ff84af", color2: "#ffdeea" },

        { ex: .45, ey: .38, bx: .49, cx: .45, cy: .61, size: .74, delay: 600,  color1: "#ff9bbc", color2: "#ffe3ed" },
        { ex: .55, ey: .37, bx: .51, cx: .55, cy: .61, size: .74, delay: 720,  color1: "#ff94b8", color2: "#ffe2ec" },
        { ex: .27, ey: .55, bx: .46, cx: .30, cy: .69, size: .62, delay: 840,  color1: "#ffa6c4", color2: "#ffe7ef" },
        { ex: .73, ey: .54, bx: .54, cx: .70, cy: .69, size: .62, delay: 960,  color1: "#ffa0bf", color2: "#ffe5ee" },
        { ex: .36, ey: .58, bx: .48, cx: .36, cy: .72, size: .58, delay: 1080, color1: "#ff7ead", color2: "#ffdae7" },

        { ex: .64, ey: .59, bx: .52, cx: .64, cy: .72, size: .58, delay: 1200, color1: "#ff80ad", color2: "#ffdae7" },
        { ex: .43, ey: .63, bx: .49, cx: .43, cy: .75, size: .52, delay: 1320, color1: "#ffb1ca", color2: "#ffe9f1" },
        { ex: .57, ey: .63, bx: .51, cx: .57, cy: .75, size: .52, delay: 1440, color1: "#ffabc7", color2: "#ffe7ef" },
        { ex: .22, ey: .68, bx: .45, cx: .26, cy: .79, size: .48, delay: 1560, color1: "#ff8fb5", color2: "#ffdeea" },
        { ex: .78, ey: .68, bx: .55, cx: .74, cy: .79, size: .48, delay: 1680, color1: "#ff8ab2", color2: "#ffdeea" },

        { ex: .31, ey: .73, bx: .47, cx: .33, cy: .82, size: .43, delay: 1800, color1: "#ff75a7", color2: "#ffd6e4" },
        { ex: .69, ey: .73, bx: .53, cx: .67, cy: .82, size: .43, delay: 1920, color1: "#ff78a9", color2: "#ffd6e4" },
        { ex: .40, ey: .76, bx: .48, cx: .40, cy: .84, size: .40, delay: 2040, color1: "#ffb6ce", color2: "#fff0f5" },
        { ex: .60, ey: .76, bx: .52, cx: .60, cy: .84, size: .40, delay: 2160, color1: "#ffb0ca", color2: "#fff0f5" },
        { ex: .50, ey: .72, bx: .50, cx: .50, cy: .83, size: .48, delay: 2280, color1: "#ff6fa3", color2: "#ffd8e5" }
      ];

      const sorted = flowers.slice().sort((a, b) => a.ey - b.ey);

      sorted.forEach((f) => {
        const p = easeOutCubic((t - f.delay) / 1300);
        if (p <= 0) return;

        const p0 = { x: baseX + (f.bx - 0.5) * w * 0.34, y: baseY };
        const p1 = { x: f.cx * w, y: f.cy * h };
        const p2 = { x: f.ex * w, y: f.ey * h };

        drawStem(p0, p1, p2, p, s);
        drawLeaves(p0, p1, p2, p, s, f.delay);
        drawBloom(p2.x, p2.y, f.size * s, p, f.color1, f.color2, t, f.delay);
      });

      drawBaseLeaves(w, h, s, t);
    }

    function drawStem(p0, p1, p2, progress, s) {
      ctx.save();

      ctx.lineWidth = 8 * s;
      ctx.lineCap = "round";
      ctx.shadowBlur = 16 * s;
      ctx.shadowColor = "rgba(31, 224, 220, 0.18)";

      const grad = ctx.createLinearGradient(p0.x, p0.y, p2.x, p2.y);
      grad.addColorStop(0, "#08706e");
      grad.addColorStop(0.45, "#25cbd0");
      grad.addColorStop(1, "#7df3ef");

      ctx.strokeStyle = grad;
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);

      const steps = Math.ceil(40 * progress);
      for (let i = 1; i <= steps; i++) {
        const tt = progress * (i / steps);
        const pt = qPoint(p0, p1, p2, tt);
        ctx.lineTo(pt.x, pt.y);
      }

      ctx.stroke();
      ctx.restore();
    }

    function drawLeaves(p0, p1, p2, progress, s, delay) {
      if (progress < 0.28) return;

      const leafProgress = easeOutBack((progress - 0.28) / 0.55);
      const positions = [0.34, 0.48, 0.62];

      positions.forEach((pos, i) => {
        const pt = qPoint(p0, p1, p2, pos);
        const next = qPoint(p0, p1, p2, pos + 0.02);
        const angle = Math.atan2(next.y - pt.y, next.x - pt.x);
        const side = i % 2 === 0 ? -1 : 1;

        drawLeaf(
          pt.x,
          pt.y,
          angle + side * 1.25,
          46 * s * leafProgress,
          19 * s * leafProgress,
          side
        );
      });
    }

    function drawLeaf(x, y, angle, len, width, side) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);

      const grad = ctx.createLinearGradient(0, 0, len, 0);
      grad.addColorStop(0, "#0b7d79");
      grad.addColorStop(1, "#35e4dc");

      ctx.fillStyle = grad;
      ctx.shadowBlur = 12;
      ctx.shadowColor = "rgba(31, 224, 220, 0.16)";

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(len * 0.35, -width, len * 0.78, -width * 0.8, len, 0);
      ctx.bezierCurveTo(len * 0.72, width * 0.8, len * 0.28, width, 0, 0);
      ctx.fill();

      ctx.restore();
    }

    function drawBloom(x, y, size, progress, color1, color2, t, delay) {
      const open = easeOutBack((progress - 0.58) / 0.42);
      if (open <= 0) return;

      ctx.save();
      ctx.translate(x, y);
      ctx.scale(open, open);

      ctx.shadowBlur = 20 * size;
      ctx.shadowColor = "rgba(255, 105, 170, 0.38)";

      for (let i = 0; i < 6; i++) {
        const a = -Math.PI / 2 + i * Math.PI * 2 / 6;
        drawPetal(a, size, color1, color2);
      }

      const centerGrad = ctx.createRadialGradient(0, 0, 2 * size, 0, 0, 19 * size);
      centerGrad.addColorStop(0, "#fff7b8");
      centerGrad.addColorStop(0.55, "#f7d94d");
      centerGrad.addColorStop(1, "#d1ae00");

      ctx.fillStyle = centerGrad;
      ctx.shadowBlur = 14 * size;
      ctx.shadowColor = "rgba(255, 236, 87, 0.55)";
      ctx.beginPath();
      ctx.ellipse(0, 0, 22 * size, 11 * size, 0, 0, Math.PI * 2);
      ctx.fill();

      const blink = 0.5 + Math.sin((t + delay) * 0.004) * 0.5;
      ctx.globalAlpha = 0.35 + blink * 0.45;
      ctx.fillStyle = "#fff36a";
      ctx.shadowBlur = 18 * size;
      ctx.shadowColor = "#fff36a";
      ctx.beginPath();
      ctx.arc(-19 * size, -18 * size, 3.2 * size, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(18 * size, -15 * size, 2.8 * size, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawPetal(angle, size, color1, color2) {
      ctx.save();
      ctx.rotate(angle);

      const grad = ctx.createLinearGradient(0, -58 * size, 0, 8 * size);
      grad.addColorStop(0, color2);
      grad.addColorStop(0.72, color1);
      grad.addColorStop(1, "#e84f88");

      ctx.fillStyle = grad;

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(-24 * size, -16 * size, -25 * size, -52 * size, 0, -64 * size);
      ctx.bezierCurveTo(25 * size, -52 * size, 24 * size, -16 * size, 0, 0);
      ctx.fill();

      ctx.restore();
    }

    function drawBaseLeaves(w, h, s, t) {
      const baseY = h * 0.90;
      const cx = w / 2;
      const p = easeOutCubic(t / 1900);

      for (let i = 0; i < 30; i++) {
        const side = i % 2 === 0 ? -1 : 1;
        const x = cx + (i - 15) * 13 * s;
        const y = baseY - (i % 6) * 12 * s;
        const len = (55 + (i % 7) * 11) * s * p;
        const width = (18 + (i % 4) * 4) * s * p;
        const angle = side * (0.85 + (i % 5) * 0.12) - Math.PI / 2;

        drawLeaf(x, y, angle, len, width, side);
      }
    }

    function drawHira(w, h, s, t) {
      const p = easeOutCubic((t - 2100) / 900);
      if (p <= 0) return;

      ctx.save();
      ctx.globalAlpha = p;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "900 " + Math.max(28 * s, 24) + "px Segoe UI, Arial";
      ctx.shadowBlur = 18 * s;
      ctx.shadowColor = "rgba(255, 120, 180, 0.85)";
      ctx.fillStyle = "rgba(255, 205, 224, 0.92)";
      ctx.fillText("Hira", w / 2, h * 0.79);
      ctx.restore();
    }
  </script>
