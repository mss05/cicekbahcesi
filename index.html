<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çiçek</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #fff8dc);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .card {
      width: 90%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.85);
      padding: 28px;
      border-radius: 28px;
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.18);
    }

    .banner {
      width: 100%;
      max-width: 360px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    h1 {
      color: #d6336c;
      font-size: 30px;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 28px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    #yesBtn {
      background-color: #ff4d8d;
      color: white;
      transform: scale(1);
      z-index: 2;
    }

    #noBtn {
      background-color: #eeeeee;
      color: #333333;
      z-index: 1;
    }

    #yesBtn:hover {
      background-color: #e03174;
    }

    #noBtn:hover {
      background-color: #dddddd;
    }

    .hidden {
      display: none;
    }

    .flower {
      font-size: 100px;
      margin-bottom: 18px;
      animation: flowerPop 1s infinite alternate;
    }

    .penguin {
      width: 230px;
      max-width: 85%;
      border-radius: 20px;
      margin-top: 20px;
    }

    .finalText {
      color: #d6336c;
      font-size: 28px;
      font-weight: bold;
      margin-top: 10px;
    }

    @keyframes flowerPop {
      from {
        transform: scale(1);
      }

      to {
        transform: scale(1.15);
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 24px;
      }

      button {
        font-size: 18px;
        padding: 12px 22px;
      }

      .flower {
        font-size: 80px;
      }
    }
  </style>
</head>

<body>

  <div class="card" id="questionScreen">
    <img src="banner.gif" alt="Banner" class="banner">

    <h1>Çiçeği kabul ediyor musun?</h1>

    <div class="buttons">
      <button id="yesBtn">Evet</button>
      <button id="noBtn">Hayır</button>
    </div>
  </div>

  <div class="card hidden" id="finalScreen">
    <div class="flower">🌸</div>

    <div class="finalText">Çiçek kabul edildi!</div>

    <img src="penguen.gif" alt="Penguen" class="penguin">
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const questionScreen = document.getElementById("questionScreen");
    const finalScreen = document.getElementById("finalScreen");

    let noClickCount = 0;
    let yesScale = 1;

    const noMessages = [
      "Emin misin?",
      "Bir daha düşün",
      "Bence evet demelisin",
      "Hayır küçülüyor farkındaysan",
      "Kaçış yok",
      "Son şans",
      "Artık evet zorunlu"
    ];

    noBtn.addEventListener("click", function () {
      noClickCount++;

      yesScale += 0.35;
      yesBtn.style.transform = "scale(" + yesScale + ")";

      noBtn.textContent = noMessages[Math.min(noClickCount - 1, noMessages.length - 1)];

      if (noClickCount >= 4) {
        noBtn.style.transform = "scale(0.8)";
      }

      if (noClickCount >= 6) {
        noBtn.style.display = "none";
        yesBtn.textContent = "Evet demek zorundasın";
        yesBtn.style.transform = "scale(2)";
      }
    });

    yesBtn.addEventListener("click", function () {
      questionScreen.classList.add("hidden");
      finalScreen.classList.remove("hidden");
    });
  </script>

</body>
</html>
