<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beni Affet 🥺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink-deep: #d6006e;
    --techno-cyan: #00e5ff;
    --techno-cyan-dark: #004d40;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #ffe9f5 0%, #ffd6ee 40%, #ffecf9 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    transition: background 1.5s ease;
  }

  /* ---- ANA EKRAN ---- */
  #main-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.4rem;
    padding: 2rem 1.5rem;
    max-width: 560px;
    width: 100%;
    text-align: center;
    z-index: 10;
  }

  .banner-wrap {
    width: 100%;
    max-width: 320px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 6px 30px rgba(255, 77, 166, 0.3);
    border: 3px solid rgba(255, 141, 203, 0.5);
    margin-bottom: 10px;
  }
  .banner-wrap img { width: 100%; display: block; }

  .msg-box {
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #message {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.15rem, 4.5vw, 1.75rem);
    color: var(--pink-deep);
    text-shadow: 0 2px 14px rgba(214, 0, 110, 0.25);
    line-height: 1.5;
    transition: opacity 0.3s ease, transform 0.3s ease;
    max-width: 480px;
  }
  #message.hidden { opacity: 0; transform: scale(0.95); }

  .btn-area {
    display: flex;
    gap: 1rem;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    position: relative;
    min-height: 80px;
    width: 100%;
  }

  #yes-btn {
    background: linear-gradient(135deg, #ff6eba, #ff3fa0);
    color: #fff;
    border: none;
    border-radius: 60px;
    padding: 14px 36px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.25rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 5px 22px rgba(255, 63, 160, 0.45);
    transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  #yes-btn:hover { transform: scale(1.06); }
  #yes-btn:active { transform: scale(0.97); }

  #no-btn {
    background: #fff;
    color: #bbb;
    border: 2px solid #e8d5e2;
    border-radius: 60px;
    padding: 11px 26px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  #no-btn:hover { background: #fff0f7; color: #999; }

  /* ---- EVET EKRANI & CSS ÇİÇEK (KASIMPATI) ---- */
  #yes-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100vh;
    animation: fadeIn 1s forwards;
    position: relative;
    z-index: 20;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .garden {
    position: relative;
    width: 100%;
    height: 380px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    margin-bottom: 2rem;
  }

  /* Çiçeğin Sapı */
  .stem {
    width: 8px;
    height: 0; /* Animasyonla uzayacak */
    background: linear-gradient(to top, var(--techno-cyan-dark), var(--techno-cyan));
    box-shadow: 0 0 15px var(--techno-cyan), inset 0 0 5px rgba(255,255,255,0.5);
    border-radius: 4px;
    position: relative;
    animation: growStem 2s ease-in-out forwards 0.5s;
  }
  @keyframes growStem { to { height: 260px; } }

  /* Büyülü Yapraklar (Leaves) */
  .leaf {
    position: absolute;
    width: 70px;
    height: 35px;
    background: rgba(0, 229, 255, 0.15);
    border-bottom: 3px solid var(--techno-cyan);
    box-shadow: inset 0 -5px 15px rgba(0, 229, 255, 0.5);
    transform: scale(0);
  }
  .leaf.right {
    bottom: 50px; left: 6px;
    border-radius: 0 100% 0 100%;
    transform-origin: bottom left;
    animation: growLeafRight 1.5s ease-out forwards 1.2s;
  }
  .leaf.left {
    bottom: 110px; right: 6px;
    border-radius: 100% 0 100% 0;
    transform-origin: bottom right;
    animation: growLeafLeft 1.5s ease-out forwards 1.5s;
  }
  @keyframes growLeafRight { to { transform: scale(1) rotate(15deg); } }
  @keyframes growLeafLeft { to { transform: scale(1) rotate(-15deg); } }

  /* Çiçek Başlığı (Kasımpatı) */
  .flower-head {
    position: absolute;
    top: 0; left: 4px; /* Sapın tam ortası */
  }

  /* Kasımpatı Taç Yaprakları (Petals) */
  .petal {
    position: absolute;
    bottom: 0; left: 0;
    transform-origin: bottom center;
    border-radius: 50% 50% 10% 10%;
    opacity: 0;
  }

  /* Kasımpatı Katmanları (Dıştan İçe Doğru) */
  .layer1 {
    width: 18px; height: 130px;
    margin-left: -9px; /* Tam ortalamak için genişliğin yarısı */
    background: linear-gradient(to top, #ff1493, #ffa6d9);
    box-shadow: 0 0 15px #ff1493;
    animation: bloom 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  .layer2 {
    width: 14px; height: 95px;
    margin-left: -7px;
    background: linear-gradient(to top, #d6006e, #ff6eba);
    box-shadow: 0 0 12px #d6006e;
    animation: bloom 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  .layer3 {
    width: 10px; height: 60px;
    margin-left: -5px;
    background: linear-gradient(to top, #9c27b0, #ff4da6);
    box-shadow: 0 0 10px #ff4da6;
    animation: bloom 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  @keyframes bloom {
    0% {
      transform: rotate(calc((360deg / var(--total)) * var(--i))) scale(0);
      opacity: 0;
    }
    100% {
      transform: rotate(calc((360deg / var(--total)) * var(--i))) scale(1) translateY(-5px);
      opacity: 0.95;
    }
  }

  /* Çiçeğin Sarı/Turuncu Göbeği */
  .flower-center {
    position: absolute;
    top: 0; left: 0;
    width: 32px; height: 32px;
    background: radial-gradient(circle, #ffeb3b, #ff9800);
    box-shadow: 0 0 25px #ffeb3b, inset 0 0 10px #ff9800;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 50;
    animation: popCenter 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 4.5s;
  }
  @keyframes popCenter { to { transform: translate(-50%, -50%) scale(1); } }

  /* Yazılar ve Penguen */
  .yes-text {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.6rem, 5vw, 2.5rem);
    color: #ff8dcb;
    text-shadow: 0 0 20px rgba(255, 141, 203, 0.8);
    animation: glow 2s ease-in-out infinite alternate;
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeIn 2s forwards 4.5s, glow 2s ease-in-out infinite alternate 4.5s;
  }
  @keyframes glow {
    from { text-shadow: 0 0 10px rgba(255,141,203,0.5); }
    to   { text-shadow: 0 0 30px rgba(255,141,203,1), 0 0 50px rgba(255,80,180,0.6); }
  }

  .penguin-row {
    display: flex; align-items: center; gap: 0.5rem;
    opacity: 0;
    animation: fadeIn 2s forwards 5s;
  }
  .penguin-gif {
    max-width: 120px; height: auto;
    animation: floatPenguin 3s ease-in-out infinite alternate;
  }
  @keyframes floatPenguin {
    0% { transform: translateY(0); }
    100% { transform: translateY(-10px); }
  }

  /* Uçuşan Kalpler ve Yıldız Tozları */
  .floater {
    position: fixed; pointer-events: none;
    animation: floatUp 2.5s ease-out forwards;
    font-size: 1.6rem; z-index: 999;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(-220px) rotate(20deg) scale(0.4); }
  }

  .sparkle {
    position: fixed; pointer-events: none;
    width: 5px; height: 5px; border-radius: 50%;
    animation: sparkleAnim 1.5s ease-out forwards;
  }
  @keyframes sparkleAnim {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }
</style>
</head>
<body>

<div id="main-screen">
  <div class="banner-wrap">
    <img src="banner.gif" alt="Seni Seviyorum Banner" />
  </div>
  <div class="msg-box">
    <div id="message">Seni Çok Seviyorum, Beni Affeder Misin? 🥺</div>
  </div>
  <div class="btn-area" id="btn-area">
    <button id="yes-btn" onclick="sayYes()">Evet 💕</button>
    <button id="no-btn" onclick="sayNo()">Hayır</button>
  </div>
</div>

<div id="yes-screen">
  <div class="garden">
    <div class="stem">
      <div class="leaf right"></div>
      <div class="leaf left"></div>
      <div class="flower-head" id="chrysanthemum-head">
        <div class="flower-center"></div>
        </div>
    </div>
  </div>
  
  <div class="yes-text">Seni çok seviyorum! 💖</div>
  <div class="penguin-row">
    <img src="penguen.gif" alt="Kalp Atan Penguen" class="penguin-gif" />
  </div>
</div>

<script>
  // ── Mesajlar (Tam 9 Adet) ────────────────────────────────────────────────
  const messages = [
    "Seni Çok Seviyorum, Beni Affeder Misin? 🥺",
    "Çabalayacağız... Lütfen beni affet 💝",
    "Bir şans daha ver, pişman olmayacaksın 🙏",
    "Seni kaybetmek istemiyorum 💕",
    "Sensiz bir hiçim, affetmeden gidemezsin! 🥺",
    "Söz veriyorum, her şey daha güzel olacak 💌",
    "Hayatımın en güzel detayı sensin...",
    "Sana layık biri olmak için çabalıyorum 🐧❤️",
    "Bir bak şu halime! Nolur beni affet! 😭"
  ];

  let noCount = 0;
  let yesFontSize = 1.25; 
  let yesPaddingV = 14;
  let yesPaddingH = 36;
  const msgEl = document.getElementById('message');
  const yesBtn = document.getElementById('yes-btn');
  const noBtn  = document.getElementById('no-btn');

  // ── Hayır Butonu Tıklanma Olayı ──────────────────────────────────────────
  function sayNo() {
    noCount++;

    msgEl.classList.add('hidden');
    setTimeout(() => {
      const msgIndex = Math.min(noCount, messages.length - 1);
      msgEl.textContent = messages[msgIndex];
      msgEl.classList.remove('hidden');
    }, 150);

    yesFontSize += 0.4;
    yesPaddingV += 8;
    yesPaddingH += 16;
    yesBtn.style.fontSize = yesFontSize + 'rem';
    yesBtn.style.padding  = `${yesPaddingV}px ${yesPaddingH}px`;

    // "Hayır" butonu yerinde kalır ama 13. basışta kaybolur.
    if (noCount >= 13) {
        noBtn.style.display = 'none'; 
    }
  }

  // ── Evet Butonu Tıklanma Olayı (Büyüyen CSS Çiçek) ───────────────────────
  function sayYes() {
    // Kalp patlaması efekti
    const emojis = ['💕','💗','💖','💝','🌸','✨','💞'];
    for (let i = 0; i < 35; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'floater';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = (5 + Math.random() * 90) + 'vw';
        el.style.top  = (60 + Math.random() * 30) + 'vh';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2500);
      }, i * 60);
    }

    // Ekranı değiştir
    setTimeout(() => {
      document.getElementById('main-screen').style.display = 'none';
      const ys = document.getElementById('yes-screen');
      ys.style.display = 'flex';
      
      // Büyülü gece atmosferi
      document.body.style.background = 'radial-gradient(circle at center, #2a0845 0%, #12011a 60%, #000000 100%)';
      
      buildChrysanthemum(); // Çiçeği oluştur
      
      // Işıltılar saç
      for(let i=0; i<40; i++) {
        setTimeout(() => sparkle(), 2000 + (i * 100));
      }
    }, 800);
  }

  // ── CSS Kasımpatı (Chrysanthemum) Oluşturucu ─────────────────────────────
  function buildChrysanthemum() {
    const flowerHead = document.getElementById('chrysanthemum-head');
    
    // Kasımpatı yoğun bir çiçektir, bu yüzden 3 katmanlı çok sayıda yaprak ekliyoruz
    const layers = [
      { class: 'layer1', count: 32, delayStart: 2.2 }, // En dış, büyük yapraklar
      { class: 'layer2', count: 24, delayStart: 2.8 }, // Orta yapraklar
      { class: 'layer3', count: 16, delayStart: 3.4 }  // En iç, küçük yapraklar
    ];

    layers.forEach(layer => {
      for (let i = 0; i < layer.count; i++) {
        let petal = document.createElement('div');
        petal.className = `petal ${layer.class}`;
        // CSS içindeki rotate hesaplaması için değişkenler
        petal.style.setProperty('--i', i);
        petal.style.setProperty('--total', layer.count);
        // Çiçek açma animasyon gecikmesi (Sap uzadıktan sonra başlar)
        petal.style.animationDelay = `${layer.delayStart + (i * 0.04)}s`;
        flowerHead.appendChild(petal);
      }
    });
  }

  // Uçuşan küçük ışıltılar
  function sparkle() {
    const el = document.createElement('div');
    el.className = 'sparkle';
    const cx = window.innerWidth  / 2;
    const cy = window.innerHeight / 2 - 50; // Çiçeğe yakın olması için
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';
    
    const tx = (Math.random() - 0.5) * 400;
    const ty = (Math.random() - 0.5) * 400;
    el.style.setProperty('--tx', tx + 'px');
    el.style.setProperty('--ty', ty + 'px');
    
    const colors = ['#00e5ff', '#ff1493', '#ff8dcb', '#fff', '#ffeb3b'];
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.boxShadow = `0 0 10px ${el.style.background}`;
    
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
</script>
</body>
</html>
