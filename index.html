<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hira</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg1: #f8f3f1;
      --bg2: #efe5dc;
      --card: rgba(255, 255, 255, 0.82);
      --card-border: rgba(255, 255, 255, 0.75);
      --text: #3f2d38;
      --muted: #8e7b86;
      --pink: #ef6b9d;
      --pink-dark: #df4d87;
      --soft: #f2eef0;
      --shadow: 0 22px 60px rgba(77, 48, 61, 0.12);
      --green1: #4f9c52;
      --green2: #2d6d34;
      --paper1: #f6e4d3;
      --paper2: #ead1bb;
      --paper3: #fff6ef;
      --gold: #f1c86c;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 217, 230, 0.35), transparent 25%),
        radial-gradient(circle at top right, rgba(255, 236, 205, 0.42), transparent 28%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text);
      padding: 18px;
      overflow-x: hidden;
    }

    .card {
      width: min(92vw, 860px);
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 34px;
      padding: 28px 28px 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.28), transparent 45%),
        radial-gradient(circle at 18% 10%, rgba(255,255,255,0.4), transparent 16%);
      pointer-events: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      padding: 10px 20px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(0,0,0,0.04);
      box-shadow: 0 10px 24px rgba(0,0,0,0.04);
      font-size: 14px;
      font-weight: 700;
      color: #8c7480;
      margin-bottom: 18px;
      position: relative;
      z-index: 2;
    }

    .banner {
      width: min(100%, 390px);
      border-radius: 24px;
      margin-bottom: 22px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.12);
      position: relative;
      z-index: 2;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(36px, 5vw, 60px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: #43313b;
      position: relative;
      z-index: 2;
    }

    .sub {
      margin: 0 auto 30px;
      max-width: 620px;
      font-size: clamp(16px, 2vw, 18px);
      line-height: 1.55;
      color: var(--muted);
      position: relative;
      z-index: 2;
    }

    .buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      min-height: 90px;
      position: relative;
      z-index: 2;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 15px 30px;
      font-size: 19px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.25s ease, background 0.25s ease, opacity 0.25s ease, box-shadow 0.25s ease;
    }

    #yesBtn {
      background: linear-gradient(135deg, var(--pink), #ff93b8);
      color: #fff;
      box-shadow: 0 14px 28px rgba(239, 107, 157, 0.28);
      transform: scale(1);
    }

    #yesBtn:hover {
      background: linear-gradient(135deg, var(--pink-dark), #ff7da8);
    }

    #noBtn {
      background: #efebee;
      color: #4b3d45;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.05);
    }

    #noBtn:hover {
      background: #e7e1e5;
    }

    .note {
      margin-top: 26px;
      font-size: 14px;
      color: #9a8690;
      font-weight: 600;
      position: relative;
      z-index: 2;
    }

    .hidden {
      display: none;
    }

    .final-title {
      margin: 8px 0 8px;
      font-size: clamp(34px, 5vw, 60px);
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: #43313b;
      position: relative;
      z-index: 2;
    }

    .final-sub {
      margin: 0 auto 18px;
      max-width: 600px;
      font-size: clamp(16px, 2vw, 18px);
      line-height: 1.5;
      color: var(--muted);
      position: relative;
      z-index: 2;
    }

    .bouquet-scene {
      width: min(100%, 710px);
      height: clamp(420px, 58vw, 590px);
      margin: 24px auto 22px;
      position: relative;
      border-radius: 34px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.82), transparent 18%),
        radial-gradient(circle at 78% 14%, rgba(255,255,255,0.65), transparent 16%),
        linear-gradient(180deg, #fff7f9 0%, #fff3e7 55%, #f5ebe6 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.65),
        0 18px 44px rgba(92, 58, 70, 0.12);
      position: relative;
      z-index: 2;
    }

    .glow {
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.6), transparent 70%);
      left: 50%;
      transform: translateX(-50%);
      bottom: 150px;
      filter: blur(18px);
      pointer-events: none;
    }

    .spark {
      position: absolute;
      color: #f2c45a;
      font-size: 18px;
      opacity: 0;
      animation: sparkle 2.2s ease-in-out infinite;
      z-index: 8;
    }

    .spark.s1 { left: 26%; top: 18%; animation-delay: 0.3s; }
    .spark.s2 { left: 39%; top: 11%; animation-delay: 0.8s; }
    .spark.s3 { left: 61%; top: 13%; animation-delay: 1.2s; }
    .spark.s4 { left: 73%; top: 22%; animation-delay: 1.6s; }
    .spark.s5 { left: 48%; top: 24%; animation-delay: 2s; }

    .bouquet {
      position: absolute;
      left: 50%;
      bottom: 42px;
      width: min(88%, 600px);
      height: 480px;
      transform: translateX(-50%);
      z-index: 3;
    }

    .bouquet-core {
      position: absolute;
      inset: 0;
    }

    .paper-back-left,
    .paper-back-right,
    .paper-front-left,
    .paper-front-right {
      position: absolute;
      bottom: 0;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.08));
    }

    .paper-back-left {
      left: 70px;
      width: 210px;
      height: 280px;
      background: linear-gradient(180deg, var(--paper3), #f2dfcf);
      clip-path: polygon(50% 0%, 100% 92%, 12% 100%);
      transform: rotate(-12deg);
      z-index: 1;
      opacity: 0.95;
    }

    .paper-back-right {
      right: 70px;
      width: 210px;
      height: 280px;
      background: linear-gradient(180deg, var(--paper3), #efdbca);
      clip-path: polygon(50% 0%, 88% 100%, 0% 92%);
      transform: rotate(12deg);
      z-index: 1;
      opacity: 0.95;
    }

    .paper-front-left {
      left: 118px;
      width: 175px;
      height: 220px;
      background: linear-gradient(180deg, var(--paper1), var(--paper2));
      clip-path: polygon(50% 0%, 100% 100%, 8% 92%);
      transform: rotate(-11deg);
      z-index: 5;
    }

    .paper-front-right {
      right: 118px;
      width: 175px;
      height: 220px;
      background: linear-gradient(180deg, var(--paper1), var(--paper2));
      clip-path: polygon(50% 0%, 92% 92%, 0% 100%);
      transform: rotate(11deg);
      z-index: 5;
    }

    .ribbon-wrap {
      position: absolute;
      left: 50%;
      bottom: 98px;
      transform: translateX(-50%);
      z-index: 7;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .ribbon {
      position: relative;
      min-width: 112px;
      padding: 10px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #f38cae, #ea5f92);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.03em;
      box-shadow: 0 10px 20px rgba(234, 95, 146, 0.25);
    }

    .ribbon::before,
    .ribbon::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #f38cae, #ea5f92);
      transform: translateY(-50%) rotate(45deg);
      z-index: -1;
      border-radius: 4px;
    }

    .ribbon::before {
      left: -8px;
    }

    .ribbon::after {
      right: -8px;
    }

    .ribbon-tail {
      width: 12px;
      height: 48px;
      background: linear-gradient(180deg, #ef79a3, #de527f);
      margin-top: -4px;
      clip-path: polygon(0 0, 100% 0, 100% 84%, 50% 100%, 0 84%);
      opacity: 0.95;
    }

    .flower {
      position: absolute;
      left: 50%;
      bottom: 118px;
      width: 78px;
      height: 220px;
      transform: translateX(-50%);
      transform-origin: bottom center;
      z-index: 4;
      opacity: 0;
    }

    .flower.grow {
      animation: flowerAppear 0.55s ease forwards;
    }

    .stem {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 5px;
      height: var(--stem-h);
      transform: translateX(-50%) scaleY(0);
      transform-origin: bottom center;
      background: linear-gradient(180deg, #5fad58, #2c6e33);
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    }

    .flower.grow .stem {
      animation: stemGrow 0.42s ease forwards;
      animation-delay: var(--delay);
    }

    .leaf {
      position: absolute;
      width: 26px;
      height: 14px;
      background: linear-gradient(135deg, #75c768, #49a04a);
      border-radius: 100% 0 100% 0;
      opacity: 0;
      box-shadow: inset 0 -1px 0 rgba(255,255,255,0.14);
    }

    .leaf1 {
      left: calc(50% - 22px);
      bottom: calc(var(--stem-h) * 0.34);
      transform: rotate(-34deg) scale(0.2);
    }

    .leaf2 {
      left: calc(50% + 1px);
      bottom: calc(var(--stem-h) * 0.56);
      transform: rotate(140deg) scale(0.2);
    }

    .flower.grow .leaf {
      animation: leafPop 0.32s ease forwards;
      animation-delay: calc(var(--delay) + 0.18s);
    }

    .bloom {
      position: absolute;
      left: 50%;
      bottom: calc(var(--stem-h) - 2px);
      width: 74px;
      height: 74px;
      transform: translateX(-50%) scale(0.1);
      transform-origin: center center;
      opacity: 0;
    }

    .flower.grow .bloom {
      animation: bloomOpen 0.36s ease forwards;
      animation-delay: calc(var(--delay) + 0.28s);
    }

    .petal {
      position: absolute;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--petal);
      box-shadow: inset 0 -3px 0 rgba(255,255,255,0.22);
    }

    .petal.p1 { top: 0; left: 23px; }
    .petal.p2 { top: 16px; left: 0; }
    .petal.p3 { top: 16px; left: 46px; }
    .petal.p4 { top: 39px; left: 12px; }
    .petal.p5 { top: 39px; left: 34px; }

    .center {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -44%);
      background: radial-gradient(circle at 35% 35%, #fff3be, #ffd15a 70%, #efb43d 100%);
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.06);
    }

    .flower.tulip .bloom {
      width: 64px;
      height: 76px;
    }

    .flower.tulip .petal {
      width: 24px;
      height: 40px;
      border-radius: 60% 60% 40% 40%;
      background: var(--petal);
    }

    .flower.tulip .petal.p1 {
      top: 3px;
      left: 20px;
      z-index: 3;
    }

    .flower.tulip .petal.p2 {
      top: 16px;
      left: 7px;
      transform: rotate(-18deg);
    }

    .flower.tulip .petal.p3 {
      top: 16px;
      left: 33px;
      transform: rotate(18deg);
    }

    .flower.tulip .petal.p4,
    .flower.tulip .petal.p5,
    .flower.tulip .center {
      display: none;
    }

    .penguin-wrap {
      position: relative;
      z-index: 2;
      margin-top: 6px;
    }

    .penguin {
      width: min(260px, 72%);
      border-radius: 24px;
      box-shadow: 0 14px 32px rgba(0,0,0,0.11);
    }

    .final-sign {
      margin-top: 18px;
      font-size: 15px;
      color: #9a8690;
      font-weight: 700;
      position: relative;
      z-index: 2;
    }

    @keyframes stemGrow {
      from {
        transform: translateX(-50%) scaleY(0);
      }
      to {
        transform: translateX(-50%) scaleY(1);
      }
    }

    @keyframes bloomOpen {
      0% {
        transform: translateX(-50%) scale(0.12);
        opacity: 0;
      }
      70% {
        transform: translateX(-50%) scale(1.08);
        opacity: 1;
      }
      100% {
        transform: translateX(-50%) scale(1);
        opacity: 1;
      }
    }

    @keyframes leafPop {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes flowerAppear {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes sparkle {
      0% {
        opacity: 0;
        transform: translateY(8px) scale(0.9);
      }
      35% {
        opacity: 1;
        transform: translateY(0) scale(1.12);
      }
      100% {
        opacity: 0;
        transform: translateY(-10px) scale(0.95);
      }
    }

    @media (max-width: 760px) {
      .card {
        padding: 22px 18px 20px;
      }

      .bouquet-scene {
        height: 500px;
      }

      .bouquet {
        width: 95%;
        height: 420px;
        bottom: 36px;
      }

      .paper-back-left,
      .paper-back-right {
        width: 180px;
        height: 250px;
      }

      .paper-front-left,
      .paper-front-right {
        width: 145px;
        height: 196px;
      }

      .paper-back-left { left: 42px; }
      .paper-back-right { right: 42px; }
      .paper-front-left { left: 86px; }
      .paper-front-right { right: 86px; }

      .ribbon-wrap {
        bottom: 92px;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 10px;
      }

      .card {
        width: 96vw;
        border-radius: 28px;
        padding: 18px 14px 18px;
      }

      .banner {
        width: 100%;
        max-width: 330px;
        margin-bottom: 18px;
      }

      h1,
      .final-title {
        font-size: 30px;
      }

      .sub,
      .final-sub {
        font-size: 15px;
        margin-bottom: 22px;
      }

      .buttons {
        gap: 12px;
      }

      button {
        font-size: 17px;
        padding: 13px 22px;
      }

      .bouquet-scene {
        height: 440px;
        border-radius: 28px;
      }

      .bouquet {
        width: 98%;
        height: 370px;
        bottom: 26px;
      }

      .flower {
        width: 60px;
        height: 190px;
        bottom: 100px;
      }

      .bloom {
        width: 58px;
        height: 58px;
      }

      .petal {
        width: 22px;
        height: 22px;
      }

      .petal.p1 { top: 0; left: 18px; }
      .petal.p2 { top: 12px; left: 0; }
      .petal.p3 { top: 12px; left: 36px; }
      .petal.p4 { top: 30px; left: 9px; }
      .petal.p5 { top: 30px; left: 27px; }

      .center {
        width: 18px;
        height: 18px;
      }

      .flower.tulip .bloom {
        width: 52px;
        height: 60px;
      }

      .flower.tulip .petal {
        width: 20px;
        height: 32px;
      }

      .flower.tulip .petal.p1 {
        left: 16px;
      }

      .flower.tulip .petal.p2 {
        left: 4px;
      }

      .flower.tulip .petal.p3 {
        left: 28px;
      }

      .paper-back-left,
      .paper-back-right {
        width: 126px;
        height: 180px;
      }

      .paper-front-left,
      .paper-front-right {
        width: 106px;
        height: 145px;
      }

      .paper-back-left { left: 28px; }
      .paper-back-right { right: 28px; }
      .paper-front-left { left: 57px; }
      .paper-front-right { right: 57px; }

      .ribbon-wrap {
        bottom: 76px;
      }

      .ribbon {
        min-width: 92px;
        padding: 8px 18px;
        font-size: 16px;
      }

      .ribbon-tail {
        height: 40px;
      }

      .penguin {
        width: min(220px, 76%);
      }

      .final-sign {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="card" id="questionScreen">
    <div class="pill">Hira</div>

    <img src="banner.gif" alt="Banner" class="banner" />

    <h1>Çiçeği kabul ediyor musun?</h1>
    <p class="sub">
      Bu soru göründüğü kadar basit değil. “Hayır” demek serbest ama sistem bu fikri çok desteklemiyor gibi.
    </p>

    <div class="buttons">
      <button id="yesBtn">Evet</button>
      <button id="noBtn">Hayır</button>
    </div>

    <div class="note">Ufak ama önemli bir soru.</div>
  </div>

  <div class="card hidden" id="finalScreen">
    <h2 class="final-title">Bir demet değil, direkt buket</h2>
    <p class="final-sub">Madem kabul edildi, özen belli olsun dedik.</p>

    <div class="bouquet-scene">
      <div class="glow"></div>

      <div class="spark s1">✦</div>
      <div class="spark s2">✦</div>
      <div class="spark s3">✦</div>
      <div class="spark s4">✦</div>
      <div class="spark s5">✦</div>

      <div class="bouquet" id="bouquetArea">
        <div class="paper-back-left"></div>
        <div class="paper-back-right"></div>

        <div class="bouquet-core" id="flowerLayer"></div>

        <div class="paper-front-left"></div>
        <div class="paper-front-right"></div>

        <div class="ribbon-wrap">
          <div class="ribbon">Hira</div>
          <div class="ribbon-tail"></div>
        </div>
      </div>
    </div>

    <div class="penguin-wrap">
      <img src="penguen.gif" alt="Penguen" class="penguin" />
    </div>

    <div class="final-sign">Hira için yapıldı ✿</div>
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const questionScreen = document.getElementById("questionScreen");
    const finalScreen = document.getElementById("finalScreen");
    const flowerLayer = document.getElementById("flowerLayer");

    let noClickCount = 0;
    let yesScale = 1;
    let bouquetBuilt = false;

    const noMessages = [
      "Emin misin?",
      "Bir daha düşün",
      "Bence evet daha iyi",
      "Hayır çok da mantıklı gelmiyor",
      "Sistem eveti destekliyor",
      "Son şans",
      "Artık evet zorunlu"
    ];

    noBtn.addEventListener("click", function () {
      noClickCount++;

      yesScale += 0.33;
      yesBtn.style.transform = "scale(" + yesScale + ")";

      noBtn.textContent = noMessages[Math.min(noClickCount - 1, noMessages.length - 1)];

      if (noClickCount >= 4) {
        noBtn.style.transform = "scale(0.85)";
        noBtn.style.opacity = "0.9";
      }

      if (noClickCount >= 6) {
        noBtn.style.display = "none";
        yesBtn.textContent = "Evet demek zorundasın";
        yesBtn.style.transform = "scale(2.05)";
      }
    });

    yesBtn.addEventListener("click", function () {
      questionScreen.classList.add("hidden");
      finalScreen.classList.remove("hidden");

      if (!bouquetBuilt) {
        buildBouquet();
        bouquetBuilt = true;
      }
    });

    function buildBouquet() {
      const isMobile = window.innerWidth <= 520;

      const flowers = [
        { x: 6,  y: 8,  scale: 0.78, type: "daisy", color: "#f7a4c6", stem: 116 },
        { x: 13, y: 12, scale: 0.84, type: "tulip", color: "#ef6f97", stem: 130 },
        { x: 19, y: 18, scale: 0.90, type: "daisy", color: "#ffd08f", stem: 144 },
        { x: 25, y: 13, scale: 0.98, type: "rose",  color: "#f08bb4", stem: 156 },
        { x: 31, y: 21, scale: 0.86, type: "daisy", color: "#cda7ff", stem: 138 },
        { x: 37, y: 9,  scale: 1.04, type: "tulip", color: "#ff88a9", stem: 176 },
        { x: 43, y: 19, scale: 0.90, type: "daisy", color: "#f4b27b", stem: 146 },
        { x: 49, y: 5,  scale: 1.14, type: "rose",  color: "#f36f9c", stem: 190 },
        { x: 55, y: 17, scale: 0.94, type: "daisy", color: "#ffc98a", stem: 152 },
        { x: 61, y: 8,  scale: 1.06, type: "tulip", color: "#ff7c9e", stem: 178 },
        { x: 67, y: 19, scale: 0.92, type: "daisy", color: "#d5a8ff", stem: 150 },
        { x: 73, y: 14, scale: 0.88, type: "rose",  color: "#f7a0c2", stem: 138 },

        { x: 10, y: 26, scale: 0.76, type: "daisy", color: "#ffb6cb", stem: 110 },
        { x: 18, y: 29, scale: 0.80, type: "daisy", color: "#ffe1a0", stem: 118 },
        { x: 27, y: 31, scale: 0.78, type: "tulip", color: "#ef8bb1", stem: 112 },
        { x: 35, y: 27, scale: 0.82, type: "daisy", color: "#f8bb85", stem: 120 },
        { x: 44, y: 33, scale: 0.76, type: "daisy", color: "#f39bb7", stem: 106 },
        { x: 53, y: 29, scale: 0.82, type: "tulip", color: "#ff8ca6", stem: 116 },
        { x: 61, y: 32, scale: 0.78, type: "daisy", color: "#c8a4ff", stem: 110 },
        { x: 69, y: 28, scale: 0.82, type: "daisy", color: "#ffd38f", stem: 118 },
        { x: 77, y: 25, scale: 0.74, type: "tulip", color: "#f58db2", stem: 104 },
        { x: 84, y: 30, scale: 0.72, type: "daisy", color: "#ffb8cc", stem: 98 }
      ];

      flowerLayer.innerHTML = "";

      flowers.forEach((f, index) => {
        const flower = document.createElement("div");
        flower.className = "flower " + (f.type === "tulip" ? "tulip" : "");
        flower.style.left = f.x + "%";
        flower.style.bottom = (isMobile ? 88 : 118) + "px";
        flower.style.setProperty("--stem-h", (isMobile ? Math.round(f.stem * 0.78) : f.stem) + "px");
        flower.style.setProperty("--petal", f.color);
        flower.style.setProperty("--delay", (index * 0.07) + "s");

        const yOffset = isMobile ? Math.round(f.y * 0.8) : f.y;
        const scale = isMobile ? (f.scale * 0.88).toFixed(2) : f.scale.toFixed(2);

        flower.style.transform =
          "translateX(-50%) translateY(" + yOffset + "px) scale(" + scale + ")";

        flower.innerHTML = `
          <div class="stem"></div>
          <div class="leaf leaf1"></div>
          <div class="leaf leaf2"></div>
          <div class="bloom">
            <span class="petal p1"></span>
            <span class="petal p2"></span>
            <span class="petal p3"></span>
            <span class="petal p4"></span>
            <span class="petal p5"></span>
            <span class="center"></span>
          </div>
        `;

        flowerLayer.appendChild(flower);

        requestAnimationFrame(() => {
          flower.classList.add("grow");
        });
      });
    }

    window.addEventListener("resize", function () {
      if (!questionScreen.classList.contains("hidden") || !bouquetBuilt) return;
      buildBouquet();
    });
  </script>
</body>
</html>
