<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hira</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      background:
        radial-gradient(circle at 15% 10%, rgba(255, 225, 235, 0.55), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(255, 238, 205, 0.6), transparent 32%),
        linear-gradient(135deg, #f8f0ee, #efe3da);
      color: #3f2d38;
      overflow-x: hidden;
    }

    .hidden {
      display: none !important;
    }

    .question-screen {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .question-card {
      width: min(92vw, 760px);
      padding: 30px 26px 28px;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 28px 70px rgba(70, 45, 55, 0.14);
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .hira-pill {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-width: 92px;
      padding: 10px 22px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(0, 0, 0, 0.04);
      color: #8d7480;
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.05);
    }

    .banner {
      display: block;
      width: min(100%, 390px);
      margin: 0 auto 24px;
      border-radius: 24px;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.13);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.05;
      letter-spacing: -0.035em;
      color: #43313b;
    }

    .question-text {
      max-width: 610px;
      margin: 0 auto 30px;
      color: #8f7c86;
      font-size: clamp(16px, 2vw, 18px);
      line-height: 1.55;
    }

    .buttons {
      min-height: 96px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 15px 31px;
      font-size: 19px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.25s ease, opacity 0.25s ease, background 0.25s ease;
    }

    #yesBtn {
      color: white;
      background: linear-gradient(135deg, #f35f98, #ff9ab8);
      box-shadow: 0 16px 30px rgba(243, 95, 152, 0.28);
      transform: scale(1);
      z-index: 3;
    }

    #noBtn {
      color: #493b43;
      background: #efebee;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.05);
      z-index: 2;
    }

    .final-screen {
      position: relative;
      width: 100vw;
      min-height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .flowers-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      z-index: 1;
    }

    .final-copy {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      text-align: center;
      color: rgba(255, 244, 249, 0.96);
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      width: min(92vw, 700px);
      pointer-events: none;
    }

    .final-copy h2 {
      margin: 0 0 6px;
      font-size: clamp(28px, 4.2vw, 52px);
      line-height: 1.05;
      letter-spacing: -0.04em;
      font-weight: 900;
    }

    .final-copy p {
      margin: 0;
      color: rgba(255, 230, 239, 0.8);
      font-size: clamp(15px, 2vw, 18px);
    }

    .penguin {
      position: fixed;
      left: 50%;
      bottom: 46px;
      transform: translateX(-50%);
      width: min(210px, 54vw);
      max-height: 170px;
      object-fit: contain;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.36);
      z-index: 6;
    }

    .final-sign {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 7;
      color: rgba(255, 224, 235, 0.82);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.2px;
      text-align: center;
    }

    @media (max-width: 700px) {
      .question-screen {
        padding: 12px;
      }

      .question-card {
        width: 96vw;
        border-radius: 28px;
        padding: 22px 16px 20px;
      }

      .banner {
        max-width: 330px;
      }

      h1 {
        font-size: 34px;
      }

      .question-text {
        font-size: 15px;
        margin-bottom: 22px;
      }

      button {
        font-size: 17px;
        padding: 13px 22px;
      }

      .final-copy {
        top: 22px;
      }

      .penguin {
        width: min(180px, 58vw);
        bottom: 42px;
      }

      .final-sign {
        bottom: 16px;
      }
    }
  </style>
</head>

<body>
  <section class="question-screen" id="questionScreen">
    <div class="question-card">
      <div class="hira-pill">Hira</div>

      <img src="banner.gif" alt="Banner" class="banner" />

      <h1>Çiçeği kabul ediyor musun?</h1>

      <p class="question-text">
        Bu soru göründüğü kadar basit değil. Hayır demek serbest ama sistem bu fikri çok desteklemiyor gibi.
      </p>

      <div class="buttons">
        <button id="yesBtn">Evet</button>
        <button id="noBtn">Hayır</button>
      </div>
    </div>
  </section>

  <section class="final-screen hidden" id="finalScreen">
    <iframe id="flowersFrame" class="flowers-frame" title="Hira flowers"></iframe>

    <div class="final-copy">
      <h2>Madem kabul edildi,</h2>
      <p>özen belli olsun dedik.</p>
    </div>

    <img src="penguen.gif" alt="Penguen" class="penguin" />

    <div class="final-sign">Hira için yapıldı</div>
  </section>

  <script>
    const questionScreen = document.getElementById("questionScreen");
    const finalScreen = document.getElementById("finalScreen");
    const flowersFrame = document.getElementById("flowersFrame");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");

    let noCount = 0;
    let yesScale = 1;

    const noMessages = [
      "Emin misin?",
      "Bir daha düşün",
      "Bence evet daha iyi",
      "Hayır biraz zayıf kaldı",
      "Sistem eveti büyütüyor",
      "Son şans",
      "Artık evet zorunlu"
    ];

    noBtn.addEventListener("click", () => {
      noCount++;
      yesScale += 0.35;

      yesBtn.style.transform = "scale(" + yesScale + ")";
      noBtn.textContent = noMessages[Math.min(noCount - 1, noMessages.length - 1)];

      if (noCount >= 4) {
        noBtn.style.transform = "scale(0.82)";
        noBtn.style.opacity = "0.75";
      }

      if (noCount >= 6) {
        noBtn.style.display = "none";
        yesBtn.textContent = "Evet demek zorundasın";
        yesBtn.style.transform = "scale(2)";
      }
    });

    yesBtn.addEventListener("click", () => {
      questionScreen.classList.add("hidden");
      finalScreen.classList.remove("hidden");

      flowersFrame.src = "flowers.html?v=" + Date.now();
    });
  </script>
</body>
</html>
