<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hira</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --pink: #ff7aa8;
      --pink2: #ff9fbd;
      --pink3: #f45b91;
      --deep: #0b1718;
      --deep2: #020707;
      --leaf: #0fb8a8;
      --leaf2: #07756f;
      --stem: #20bfc0;
      --text: #3f2d38;
      --muted: #8f7c86;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 14% 10%, rgba(255, 220, 230, 0.45), transparent 24%),
        radial-gradient(circle at 90% 14%, rgba(255, 237, 205, 0.5), transparent 28%),
        linear-gradient(135deg, #f9f1ef, #efe4db);
      overflow-x: hidden;
      color: var(--text);
    }

    .screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: min(92vw, 780px);
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 34px;
      padding: 30px 26px 28px;
      text-align: center;
      box-shadow: 0 28px 70px rgba(70, 45, 55, 0.14);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .name-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      padding: 10px 22px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(0, 0, 0, 0.04);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.05);
      color: #8d7480;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .banner {
      width: min(100%, 390px);
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.13);
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.05;
      letter-spacing: -0.035em;
      color: #43313b;
    }

    .sub {
      max-width: 610px;
      margin: 0 auto 30px;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 18px);
      line-height: 1.55;
    }

    .buttons {
      min-height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 15px 31px;
      font-size: 19px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.25s ease, opacity 0.25s ease, background 0.25s ease;
    }

    #yesBtn {
      color: white;
      background: linear-gradient(135deg, #f35f98, #ff9ab8);
      box-shadow: 0 16px 30px rgba(243, 95, 152, 0.28);
      transform: scale(1);
      z-index: 3;
    }

    #noBtn {
      color: #493b43;
      background: #efebee;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.05);
      z-index: 2;
    }

    .small-note {
      margin-top: 22px;
      color: #a08b96;
      font-size: 14px;
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }

    /* FINAL SCREEN */

    .final-screen {
      min-height: 100vh;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 20%, rgba(26, 95, 98, 0.25), transparent 34%),
        radial-gradient(circle at 20% 80%, rgba(255, 88, 150, 0.09), transparent 26%),
        linear-gradient(180deg, #0b1718 0%, #020707 100%);
      overflow: hidden;
      position: relative;
    }

    .final-stage {
      width: min(96vw, 900px);
      min-height: min(92vh, 760px);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 18px 20px;
    }

    .final-copy {
      text-align: center;
      z-index: 20;
      margin-bottom: 12px;
      color: rgba(255, 244, 249, 0.94);
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .final-copy h2 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 48px);
      letter-spacing: -0.035em;
      line-height: 1.08;
      font-weight: 850;
    }

    .final-copy p {
      margin: 0;
      font-size: clamp(15px, 2vw, 18px);
      color: rgba(255, 230, 239, 0.78);
      line-height: 1.45;
    }

    .night {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .stars,
    .stars::before,
    .stars::after {
      position: absolute;
      inset: -20%;
      content: "";
      background-repeat: repeat;
      animation: driftStars 28s linear infinite;
    }

    .stars {
      background-image:
        radial-gradient(circle, rgba(126, 245, 255, 0.9) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255, 238, 93, 0.95) 0 1px, transparent 1.5px);
      background-size: 74px 74px, 121px 121px;
      opacity: 0.38;
    }

    .stars::before {
      background-image: radial-gradient(circle, rgba(178, 255, 249, 0.8) 0 1px, transparent 1.5px);
      background-size: 42px 42px;
      opacity: 0.26;
      animation-duration: 42s;
    }

    .stars::after {
      background-image: radial-gradient(circle, rgba(255, 235, 92, 0.75) 0 1.4px, transparent 2px);
      background-size: 160px 160px;
      opacity: 0.32;
      animation-duration: 55s;
    }

    .firefly {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff36a;
      box-shadow: 0 0 12px #fff36a, 0 0 24px rgba(255, 243, 106, 0.75);
      opacity: 0;
      animation: firefly 4s ease-in-out infinite;
    }

    .f1 { left: 18%; top: 22%; animation-delay: 0.1s; }
    .f2 { left: 30%; top: 15%; animation-delay: 0.8s; }
    .f3 { right: 25%; top: 21%; animation-delay: 1.4s; }
    .f4 { right: 18%; top: 38%; animation-delay: 2.1s; }
    .f5 { left: 24%; bottom: 28%; animation-delay: 2.8s; }
    .f6 { right: 36%; bottom: 32%; animation-delay: 3.2s; }

    .bouquet-scene {
      width: min(100%, 840px);
      height: clamp(500px, 72vw, 650px);
      position: relative;
      z-index: 10;
      margin-top: -4px;
      filter: drop-shadow(0 20px 42px rgba(0, 0, 0, 0.42));
    }

    .bouquet-glow {
      position: absolute;
      width: 410px;
      height: 410px;
      border-radius: 50%;
      left: 50%;
      top: 40%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255, 120, 168, 0.20), transparent 66%);
      filter: blur(18px);
      z-index: 1;
    }

    .bouquet {
      position: absolute;
      left: 50%;
      bottom: 42px;
      width: min(94%, 710px);
      height: 560px;
      transform: translateX(-50%);
      transform-origin: bottom center;
      z-index: 4;
    }

    .bouquet-paper {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 310px;
      height: 250px;
      transform: translateX(-50%);
      z-index: 7;
      pointer-events: none;
    }

    .paper-left,
    .paper-right,
    .paper-front {
      position: absolute;
      bottom: 0;
      filter: drop-shadow(0 14px 18px rgba(0, 0, 0, 0.20));
    }

    .paper-left {
      width: 210px;
      height: 250px;
      left: 6px;
      background: linear-gradient(160deg, rgba(255, 237, 227, 0.97), rgba(226, 185, 169, 0.98));
      clip-path: polygon(48% 0%, 100% 100%, 8% 88%);
      transform: rotate(-11deg);
    }

    .paper-right {
      width: 210px;
      height: 250px;
      right: 6px;
      background: linear-gradient(200deg, rgba(255, 240, 231, 0.98), rgba(218, 176, 160, 0.98));
      clip-path: polygon(52% 0%, 92% 88%, 0% 100%);
      transform: rotate(11deg);
    }

    .paper-front {
      left: 50%;
      bottom: -2px;
      width: 190px;
      height: 176px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #f1d4c4, #c99482);
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      opacity: 0.96;
    }

    .ribbon {
      position: absolute;
      left: 50%;
      bottom: 92px;
      transform: translateX(-50%);
      min-width: 126px;
      padding: 10px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff8fb2, #ef4f8b);
      color: white;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-align: center;
      z-index: 9;
      box-shadow: 0 10px 24px rgba(255, 98, 151, 0.26);
    }

    .ribbon::before,
    .ribbon::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 28px;
      height: 28px;
      background: #ef5d91;
      transform: translateY(-50%) rotate(45deg);
      border-radius: 4px;
      z-index: -1;
    }

    .ribbon::before {
      left: -9px;
    }

    .ribbon::after {
      right: -9px;
    }

    .flower {
      --x: 50%;
      --y: 0px;
      --r: 0deg;
      --s: 1;
      --stemH: 220px;
      --delay: 0s;
      --petalA: #ff8fb5;
      --petalB: #ffc1d4;

      position: absolute;
      left: var(--x);
      bottom: 118px;
      width: 90px;
      height: calc(var(--stemH) + 100px);
      transform: translateX(-50%) translateY(var(--y)) rotate(var(--r)) scale(var(--s));
      transform-origin: bottom center;
      opacity: 0;
      z-index: var(--z);
    }

    .flower.show {
      opacity: 1;
    }

    .stem {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 8px;
      height: var(--stemH);
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.28), transparent 35%),
        linear-gradient(180deg, #2be3dd, #0c7978 80%);
      transform: translateX(-50%) scaleY(0);
      transform-origin: bottom center;
      box-shadow: 0 0 16px rgba(30, 230, 225, 0.18);
    }

    .flower.show .stem {
      animation: growStem 0.8s cubic-bezier(.18,.89,.32,1.18) forwards;
      animation-delay: var(--delay);
    }

    .leaf {
      position: absolute;
      width: 56px;
      height: 26px;
      background:
        radial-gradient(circle at 28% 30%, rgba(255,255,255,0.22), transparent 35%),
        linear-gradient(135deg, #2be0d4, #087a78);
      border-radius: 100% 0 100% 0;
      opacity: 0;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.18));
    }

    .leaf.l1 {
      left: calc(50% - 52px);
      bottom: calc(var(--stemH) * 0.30);
      transform: rotate(-34deg) scale(0.1);
    }

    .leaf.l2 {
      left: calc(50% + 2px);
      bottom: calc(var(--stemH) * 0.45);
      transform: rotate(138deg) scale(0.1);
    }

    .leaf.l3 {
      left: calc(50% - 50px);
      bottom: calc(var(--stemH) * 0.62);
      transform: rotate(-30deg) scale(0.1);
    }

    .flower.show .leaf {
      animation: popLeaf 0.55s ease forwards;
      animation-delay: calc(var(--delay) + 0.45s);
    }

    .bloom {
      position: absolute;
      left: 50%;
      bottom: calc(var(--stemH) - 4px);
      width: 98px;
      height: 92px;
      transform: translateX(-50%) scale(0.02);
      opacity: 0;
      filter:
        drop-shadow(0 0 14px rgba(255, 137, 185, 0.28))
        drop-shadow(0 8px 10px rgba(0, 0, 0, 0.24));
    }

    .flower.show .bloom {
      animation: openBloom 0.76s cubic-bezier(.18,.89,.32,1.35) forwards;
      animation-delay: calc(var(--delay) + 0.68s);
    }

    .petal {
      position: absolute;
      left: 50%;
      top: 52%;
      width: 34px;
      height: 58px;
      border-radius: 50% 50% 46% 46%;
      background:
        radial-gradient(circle at 34% 22%, rgba(255,255,255,0.62), transparent 26%),
        linear-gradient(180deg, var(--petalB), var(--petalA) 74%);
      transform-origin: 50% 88%;
      box-shadow: inset 0 -5px 10px rgba(150, 36, 82, 0.12);
    }

    .p1 { transform: translate(-50%, -88%) rotate(0deg); }
    .p2 { transform: translate(-50%, -88%) rotate(72deg); }
    .p3 { transform: translate(-50%, -88%) rotate(144deg); }
    .p4 { transform: translate(-50%, -88%) rotate(216deg); }
    .p5 { transform: translate(-50%, -88%) rotate(288deg); }

    .bloom-center {
      position: absolute;
      left: 50%;
      top: 53%;
      width: 42px;
      height: 18px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 35%, #fff9c7, #f7d94d 50%, #d4b300 85%);
      box-shadow:
        0 0 0 5px rgba(255,255,255,0.58),
        0 0 18px rgba(255, 241, 105, 0.34);
      z-index: 4;
    }

    .mini-light {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fff36a;
      box-shadow: 0 0 12px #fff36a;
      opacity: 0;
      z-index: 5;
    }

    .ml1 { left: 25%; top: 20%; }
    .ml2 { right: 22%; top: 28%; }
    .ml3 { left: 46%; top: 4%; }

    .flower.show .mini-light {
      animation: blink 2.4s ease-in-out infinite;
      animation-delay: calc(var(--delay) + 1.2s);
    }

    .grass-blade {
      position: absolute;
      bottom: 0;
      width: 12px;
      height: var(--h);
      left: var(--x);
      background: linear-gradient(180deg, #1eb433, #033e16 88%);
      border-radius: 100% 100% 0 0;
      transform-origin: bottom center;
      transform: rotate(var(--r)) scaleY(0);
      filter: drop-shadow(0 0 8px rgba(0, 255, 72, 0.1));
      z-index: 2;
      animation: grassGrow 1.2s ease forwards;
      animation-delay: var(--d);
    }

    .penguin-wrap {
      z-index: 30;
      margin-top: -14px;
      text-align: center;
    }

    .penguin {
      width: min(215px, 52vw);
      max-height: 170px;
      object-fit: contain;
      border-radius: 22px;
      box-shadow: 0 18px 42px rgba(0,0,0,0.35);
      background: rgba(255,255,255,0.88);
    }

    .final-sign {
      z-index: 30;
      margin-top: 16px;
      color: rgba(255, 224, 235, 0.78);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.2px;
      text-align: center;
    }

    @keyframes growStem {
      from {
        transform: translateX(-50%) scaleY(0);
      }
      to {
        transform: translateX(-50%) scaleY(1);
      }
    }

    @keyframes popLeaf {
      0% {
        opacity: 0;
        scale: 0.15;
      }
      70% {
        opacity: 1;
        scale: 1.08;
      }
      100% {
        opacity: 1;
        scale: 1;
      }
    }

    @keyframes openBloom {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(0.02) rotate(-10deg);
      }
      65% {
        opacity: 1;
        transform: translateX(-50%) scale(1.12) rotate(2deg);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) scale(1) rotate(0deg);
      }
    }

    @keyframes blink {
      0%, 100% {
        opacity: 0.12;
        transform: scale(0.8);
      }
      45% {
        opacity: 1;
        transform: scale(1.25);
      }
    }

    @keyframes firefly {
      0%, 100% {
        opacity: 0;
        transform: translateY(10px) scale(0.8);
      }
      40%, 60% {
        opacity: 1;
        transform: translateY(-8px) scale(1.2);
      }
    }

    @keyframes driftStars {
      from {
        transform: translate3d(0, 0, 0);
      }
      to {
        transform: translate3d(-60px, 40px, 0);
      }
    }

    @keyframes grassGrow {
      to {
        transform: rotate(var(--r)) scaleY(1);
      }
    }

    @media (max-width: 700px) {
      .screen {
        padding: 12px;
      }

      .card {
        width: 96vw;
        border-radius: 28px;
        padding: 22px 16px 20px;
      }

      .banner {
        max-width: 330px;
      }

      h1 {
        font-size: 34px;
      }

      .sub {
        font-size: 15px;
        margin-bottom: 22px;
      }

      button {
        font-size: 17px;
        padding: 13px 22px;
      }

      .final-screen {
        padding: 8px;
        align-items: flex-start;
      }

      .final-stage {
        min-height: 100vh;
        padding-top: 28px;
      }

      .final-copy h2 {
        font-size: 29px;
      }

      .final-copy p {
        font-size: 15px;
      }

      .bouquet-scene {
        height: 500px;
        margin-top: 4px;
      }

      .bouquet {
        width: 104%;
        height: 430px;
        bottom: 30px;
        transform: translateX(-50%) scale(0.86);
      }

      .bouquet-paper {
        transform: translateX(-50%) scale(0.86);
        bottom: -10px;
      }

      .ribbon {
        bottom: 82px;
        font-size: 17px;
        min-width: 108px;
        padding: 9px 22px;
      }

      .penguin-wrap {
        margin-top: -28px;
      }

      .penguin {
        width: min(190px, 62vw);
      }

      .final-sign {
        margin-top: 12px;
        padding-bottom: 8px;
      }
    }

    @media (max-width: 430px) {
      .final-copy h2 {
        font-size: 26px;
      }

      .bouquet-scene {
        height: 455px;
      }

      .bouquet {
        transform: translateX(-50%) scale(0.77);
        bottom: 18px;
      }

      .bouquet-paper {
        transform: translateX(-50%) scale(0.77);
        bottom: -18px;
      }

      .ribbon {
        bottom: 72px;
      }
    }
  </style>
</head>

<body>
  <section class="screen" id="questionScreen">
    <div class="card">
      <div class="name-pill">Hira</div>

      <img src="banner.gif" alt="Banner" class="banner" />

      <h1>Çiçeği kabul ediyor musun?</h1>

      <p class="sub">
        Bu soru göründüğü kadar basit değil. “Hayır” demek serbest ama sistem bu fikri çok desteklemiyor gibi.
      </p>

      <div class="buttons">
        <button id="yesBtn">Evet</button>
        <button id="noBtn">Hayır</button>
      </div>

      <div class="small-note">Ufak ama önemli bir soru.</div>
    </div>
  </section>

  <section class="final-screen hidden" id="finalScreen">
    <div class="night">
      <div class="stars"></div>

      <div class="firefly f1"></div>
      <div class="firefly f2"></div>
      <div class="firefly f3"></div>
      <div class="firefly f4"></div>
      <div class="firefly f5"></div>
      <div class="firefly f6"></div>
    </div>

    <div class="final-stage">
      <div class="final-copy">
        <h2>Madem kabul edildi,</h2>
        <p>özen belli olsun dedik.</p>
      </div>

      <div class="bouquet-scene">
        <div class="bouquet-glow"></div>

        <div class="bouquet" id="bouquet">
          <div id="grassLayer"></div>
          <div id="flowerLayer"></div>

          <div class="bouquet-paper">
            <div class="paper-left"></div>
            <div class="paper-right"></div>
            <div class="paper-front"></div>
          </div>

          <div class="ribbon">Hira</div>
        </div>
      </div>

      <div class="penguin-wrap">
        <img src="penguen.gif" alt="Penguen" class="penguin" />
      </div>

      <div class="final-sign">Hira için yapıldı</div>
    </div>
  </section>

  <script>
    const questionScreen = document.getElementById("questionScreen");
    const finalScreen = document.getElementById("finalScreen");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const flowerLayer = document.getElementById("flowerLayer");
    const grassLayer = document.getElementById("grassLayer");

    let noCount = 0;
    let yesScale = 1;
    let bouquetCreated = false;

    const noTexts = [
      "Emin misin?",
      "Bir daha düşün",
      "Bence evet daha iyi",
      "Hayır biraz zayıf kaldı",
      "Sistem eveti büyütüyor",
      "Son şans",
      "Artık evet zorunlu"
    ];

    noBtn.addEventListener("click", () => {
      noCount++;
      yesScale += 0.34;

      yesBtn.style.transform = "scale(" + yesScale + ")";
      noBtn.textContent = noTexts[Math.min(noCount - 1, noTexts.length - 1)];

      if (noCount >= 4) {
        noBtn.style.transform = "scale(0.82)";
        noBtn.style.opacity = "0.82";
      }

      if (noCount >= 6) {
        noBtn.style.display = "none";
        yesBtn.textContent = "Evet demek zorundasın";
        yesBtn.style.transform = "scale(2.05)";
      }
    });

    yesBtn.addEventListener("click", () => {
      questionScreen.classList.add("hidden");
      finalScreen.classList.remove("hidden");

      if (!bouquetCreated) {
        createGrass();
        createFlowers();
        bouquetCreated = true;
      }
    });

    function createFlowers() {
      const flowers = [
        { x: 15, y: 50, r: -31, s: .68, h: 185, z: 3, a: "#ff86ad", b: "#ffc5d8" },
        { x: 22, y: 6,  r: -24, s: .92, h: 260, z: 4, a: "#ff74a4", b: "#ffd0df" },
        { x: 29, y: 42, r: -19, s: .74, h: 202, z: 4, a: "#ff9abd", b: "#ffd8e4" },
